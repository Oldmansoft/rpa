<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>studio</title>
        <link href="studio_layout.css" rel="stylesheet" />
        <link href="studio_design.css" rel="stylesheet" />
        <link href="//at.alicdn.com/t/c/font_4171489_g4wilp5620u.css" rel="stylesheet" />
        <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
        <script src="studio_design.js"></script>
    </head>
    <body>
        <div class="studio">
            <div class="top">
                <div class="menu">
                    <i class="font i-home"></i>
                    <span>首页</span>
                </div>
                <div class="menu">
                    <i class="font i-open"></i>
                    <span>打开</span>
                </div>
                <div class="menu">
                    <i class="font i-save"></i>
                    <span>保存</span>
                </div>
                <div class="menu">
                    <i class="font i-export"></i>
                    <span>导出</span>
                </div>
                <div class="menu">
                    <i class="font i-run"></i>
                    <span>运行</span>
                </div>
            </div>
            <div class="other">
                <div class="left"></div>
                <div class="center">
                    <div class="workspace">
                        <div class="editor">
                            <article class="item" draggable="true">
                                <ul>
                                    <li>
                                        <aside>1</aside>
                                        <i class="font i-var"></i>
                                    </li>
                                    <li>
                                        <h4>Set Variable</h4>
                                        <p>Set<var>CounterX</var>to<var>3</var></p>
                                    </li>
                                </ul>
                            </article>
                            <section class="loop">
                                <header draggable="true">
                                    <ul>
                                        <li>
                                            <aside>2</aside>
                                            <i class="font i-loop"></i>
                                        </li>
                                        <li>
                                            <h4>Where</h4>
                                            <p>i &gt; 0</p>
                                        </li>
                                    </ul>
                                </header>
                                <main>
                                    <article class="item" draggable="true">
                                        <ul>
                                            <li>
                                                <aside>3</aside>
                                                <i class="font i-var"></i>
                                            </li>
                                            <li>
                                                <h4>Print</h4>
                                                <p>hello, world</p>
                                            </li>
                                        </ul>
                                    </article>
                                    <section class="if">
                                        <header draggable="true">
                                            <ul>
                                                <li>
                                                    <aside>4</aside>
                                                    <i class="font i-loop"></i>
                                                </li>
                                                <li>
                                                    <h4>If</h4>
                                                    <p>i &gt; 10</p>
                                                </li>
                                            </ul>
                                        </header>
                                        <main>
                                            <article class="item" draggable="true">
                                                <ul>
                                                    <li>
                                                        <aside>5</aside>
                                                        <i class="font i-var"></i>
                                                    </li>
                                                    <li>
                                                        <h4>Log</h4>
                                                        <p>Break</p>
                                                    </li>
                                                </ul>
                                            </article>
                                            <article class="item" draggable="true">
                                                <ul>
                                                    <li>
                                                        <aside>6</aside>
                                                        <i class="font i-loop-none"></i>
                                                    </li>
                                                    <li>
                                                        <h4>Break</h4>
                                                    </li>
                                                </ul>
                                            </article>
                                        </main>
                                        <footer draggable="true">
                                            <ul>
                                                <li>
                                                    <aside>7</aside>
                                                    <i class="font i-flag"></i>
                                                </li>
                                                <li>
                                                    <h4>End</h4>
                                                </li>
                                            </ul>
                                        </footer>
                                    </section>
                                </main>
                                <footer draggable="true">
                                    <ul>
                                        <li>
                                            <aside>8</aside>
                                            <i class="font i-flag"></i>
                                        </li>
                                        <li>
                                            <h4>End</h4>
                                        </li>
                                    </ul>
                                </footer>
                            </section>
                            <article class="item" draggable="true">
                                <ul>
                                    <li>
                                        <aside>9</aside>
                                        <i class="font i-var"></i>
                                    </li>
                                    <li>
                                        <h4>Log</h4>
                                        <p>结束</p>
                                    </li>
                                </ul>
                            </article>
                        </div>
                        <div id="drop_line"><div></div></div>
                    </div>
                    <div class="bottom"></div>
                </div>
                <div class="right"></div>
            </div>
        </div>
    </body>
</html>
