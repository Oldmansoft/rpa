<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>可视设计器</title>
        <link rel="Shortcut Icon" href="favicon.png" type="image/x-icon" />
        <link href="studio.css" rel="stylesheet" />
        <link href="studio_layout.css" rel="stylesheet" />
        <link href="studio_design.css" rel="stylesheet" />
        <link href="studio_component.css" rel="stylesheet" />
        <link href="studio_property.css" rel="stylesheet" />
        <link href="studio_dialog.css" rel="stylesheet" />
        <link href="//at.alicdn.com/t/c/font_4171489_0zcln0ssybx.css" rel="stylesheet" />
        <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.1/socket.io.js"></script>
        <script src="https://cdn.staticfile.org/react/16.4.0/umd/react.development.js"></script>
        <script src="https://cdn.staticfile.org/react-dom/16.4.0/umd/react-dom.development.js"></script>
        <script src="https://cdn.staticfile.org/babel-standalone/6.26.0/babel.min.js"></script>
        <script src="studio.js"></script>
        <script src="studio_design.js"></script>
        <script src="studio_component.js"></script>
        <script src="studio_communication.js"></script>
        <script src="studio_ready.js"></script>
    </head>
    <body>
        <div class="studio">
            <div class="top">
                <div class="menu">
                    <i class="font i-home"></i>
                    <span>首页</span>
                </div>
                <div class="menu">
                    <i class="font i-project-create"></i>
                    <span>创建</span>
                </div>
                <div class="menu">
                    <i class="font i-project-open"></i>
                    <span>打开</span>
                </div>
                <div class="menu">
                    <i class="font i-save"></i>
                    <span>保存</span>
                </div>
                <div class="menu">
                    <i class="font i-export"></i>
                    <span>导出</span>
                </div>
                <div class="menu">
                    <i class="font i-run"></i>
                    <span>运行</span>
                </div>
            </div>
            <div class="other">
                <div class="left"></div>
                <div class="center">
                    <div class="tabs"></div>
                    <div class="workspace">
                        <div class="parameters in">
                            <span>输入参数设置</span>
                        </div>
                        <div class="variables">
                            <span>局部变量设置</span>
                        </div>
                        <div class="editor"></div>
                        <div id="drop_line"><div></div></div>
                        <div class="parameters out">
                            <span>输出参数设置</span>
                        </div>
                    </div>
                    <div class="bottom">
                        <div class="label-group">
                            <label>属性</label>
                            <label>输出</label>
                            <label>业务</label>
                        </div>
                        <div class="label-content">
                            <div class="property"></div>
                            <div class="output"></div>
                            <div class="bussiness"></div>
                        </div>
                    </div>
                </div>
                <div class="right">
                    <div class="project"></div>
                </div>
            </div>
        </div>
    </body>
</html>
