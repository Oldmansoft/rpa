<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>studio</title>
        <link href="studio_layout.css" rel="stylesheet" />
        <link href="studio_design.css" rel="stylesheet" />
        <link href="//at.alicdn.com/t/c/font_4171489_j69bafsp74d.css" rel="stylesheet" />
        <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
        <script src="studio_design.js"></script>
    </head>
    <body>
        <div class="studio">
            <div class="menu">
                <div>首页</div>
                <div>打开</div>
                <div>保存</div>
                <div>导出</div>
                <div>运行</div>
            </div>
            <div class="panel">
                <div class="tools"></div>
                <div class="content">
                    <div class="workspace">
                        <div class="container">
                            <article draggable="true">
                                <ul>
                                    <li>
                                        <aside>1</aside>
                                        <i class="iconfont icon-var"></i>
                                    </li>
                                    <li>
                                        <h4>Set Variable</h4>
                                        <p>Set<var>CounterX</var>to<var>3</var></p>
                                    </li>
                                </ul>
                            </article>
                            <section class="loop">
                                <header draggable="true">
                                    <ul>
                                        <li>
                                            <aside>2</aside>
                                            <i class="iconfont icon-loop"></i>
                                        </li>
                                        <li>
                                            <h4>Where</h4>
                                            <p>i &gt; 0</p>
                                        </li>
                                    </ul>
                                </header>
                                <main>
                                    <article draggable="true">
                                        <ul>
                                            <li>
                                                <aside>3</aside>
                                                <i class="iconfont icon-var"></i>
                                            </li>
                                            <li>
                                                <h4>Print</h4>
                                                <p>hello, world</p>
                                            </li>
                                        </ul>
                                    </article>
                                    <section class="if">
                                        <header draggable="true">
                                            <ul>
                                                <li>
                                                    <aside>4</aside>
                                                    <i class="iconfont icon-loop"></i>
                                                </li>
                                                <li>
                                                    <h4>If</h4>
                                                    <p>i &gt; 10</p>
                                                </li>
                                            </ul>
                                        </header>
                                        <main>
                                            <article draggable="true">
                                                <ul>
                                                    <li>
                                                        <aside>5</aside>
                                                        <i class="iconfont icon-var"></i>
                                                    </li>
                                                    <li>
                                                        <h4>Log</h4>
                                                        <p>Break</p>
                                                    </li>
                                                </ul>
                                            </article>
                                            <article draggable="true">
                                                <ul>
                                                    <li>
                                                        <aside>6</aside>
                                                        <i class="iconfont icon-loop-none"></i>
                                                    </li>
                                                    <li>
                                                        <h4>Break</h4>
                                                    </li>
                                                </ul>
                                            </article>
                                        </main>
                                        <footer draggable="true">
                                            <ul>
                                                <li>
                                                    <aside>7</aside>
                                                    <i class="iconfont icon-flag"></i>
                                                </li>
                                                <li>
                                                    <h4>End</h4>
                                                </li>
                                            </ul>
                                        </footer>
                                    </section>
                                </main>
                                <footer draggable="true">
                                    <ul>
                                        <li>
                                            <aside>8</aside>
                                            <i class="iconfont icon-flag"></i>
                                        </li>
                                        <li>
                                            <h4>End</h4>
                                        </li>
                                    </ul>
                                </footer>
                            </section>
                            <article draggable="true">
                                <ul>
                                    <li>
                                        <aside>9</aside>
                                        <i class="iconfont icon-var"></i>
                                    </li>
                                    <li>
                                        <h4>Log</h4>
                                        <p>结束</p>
                                    </li>
                                </ul>
                            </article>
                        </div>
                        <div id="drop_line"><div></div></div>
                    </div>
                    <div class="console"></div>
                </div>
                <div class="property"></div>
            </div>
        </div>
    </body>
</html>
